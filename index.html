<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1f1f1f;
  --border: #2a2a2a;
  --text: #ffffff;
  --muted: #888;
  --c1: #ff5c35;
  --c2: #ffd700;
  --c3: #00e5a0;
  --c4: #4d9fff;
  --c5: #ff4db8;
  --c6: #bf7fff;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
}

.header-left { display: flex; flex-direction: column; gap: 4px; }

.header-tag {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--c1);
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-tag::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--c1);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

h1 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
}

.last-updated {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  background: var(--surface);
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}

.filters {
  display: flex;
  gap: 8px;
  margin-bottom: 2rem;
  flex-wrap: wrap;
}

select, input[type="text"] {
  font-family: 'Syne', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

select:focus, input[type="text"]:focus {
  border-color: var(--c1);
  background: var(--surface2);
}

input[type="text"] { min-width: 220px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}

.stat-card {
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  position: relative;
  overflow: hidden;
  border: 1px solid transparent;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 50%;
  opacity: 0.12;
  transform: translate(20px, -20px);
}

.stat-card.c1 { background: #1a0f0b; border-color: #ff5c3540; }
.stat-card.c1::after { background: var(--c1); }
.stat-card.c2 { background: #1a1600; border-color: #ffd70040; }
.stat-card.c2::after { background: var(--c2); }
.stat-card.c3 { background: #001a12; border-color: #00e5a040; }
.stat-card.c3::after { background: var(--c3); }
.stat-card.c4 { background: #071525; border-color: #4d9fff40; }
.stat-card.c4::after { background: var(--c4); }

.stat-accent {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-card.c1 .stat-accent { color: var(--c1); }
.stat-card.c2 .stat-accent { color: var(--c2); }
.stat-card.c3 .stat-accent { color: var(--c3); }
.stat-card.c4 .stat-accent { color: var(--c4); }

.stat-value {
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  color: #fff;
}

.stat-sub {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 6px;
}

.stat-card.c4 .stat-value { font-size: 1.1rem; margin-top: 4px; }

.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 2rem;
}

@media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
}

.chart-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.chart-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.chart-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.05em;
}

.chart-wrap { position: relative; width: 100%; height: 230px; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-top: 12px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  color: #aaa;
  font-weight: 500;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
}

.table-title {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.table-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 20px;
}

table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

thead th {
  text-align: left;
  padding: 10px 1.5rem;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

tbody tr {
  border-bottom: 1px solid #1e1e1e;
  transition: background 0.15s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

tbody td {
  padding: 11px 1.5rem;
  color: #ddd;
  vertical-align: middle;
}

.company-name { font-weight: 600; color: #fff; }

.badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem;
  color: var(--muted);
  font-size: 0.85rem;
  gap: 12px;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--c1);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.no-data {
  padding: 3rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 1.5rem;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--muted);
}

.pag-btns { display: flex; gap: 4px; }

.pag-btn {
  padding: 5px 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  font-family: 'Syne', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  color: #aaa;
  transition: all 0.15s;
}

.pag-btn:hover { border-color: var(--c1); color: var(--c1); }
.pag-btn:disabled { opacity: 0.3; cursor: default; }
.pag-btn.active { background: var(--c1); color: #fff; border-color: var(--c1); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-tag">Live data</span>
    <h1>Vendor Directory</h1>
  </div>
  <span class="last-updated" id="lastUpdated">Loading...</span>
</header>

<div class="filters">
  <input type="text" id="searchInput" placeholder="Search company or owner..." oninput="applyFilters()">
  <select id="categoryFilter" onchange="applyFilters()">
    <option value="">All categories</option>
  </select>
  <select id="subcategoryFilter" onchange="applyFilters()">
    <option value="">All subcategories</option>
  </select>
  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All years</option>
  </select>
</div>

<div class="stats-grid">
  <div class="stat-card c1">
    <div class="stat-accent">Total vendors</div>
    <div class="stat-value" id="statTotal">—</div>
    <div class="stat-sub">in directory</div>
  </div>
  <div class="stat-card c2">
    <div class="stat-accent">Categories</div>
    <div class="stat-value" id="statCats">—</div>
    <div class="stat-sub">business types</div>
  </div>
  <div class="stat-card c3">
    <div class="stat-accent">Subcategories</div>
    <div class="stat-value" id="statSubs">—</div>
    <div class="stat-sub">specialisations</div>
  </div>
  <div class="stat-card c4">
    <div class="stat-accent">Newest vendor</div>
    <div class="stat-value" id="statNewest">—</div>
    <div class="stat-sub" id="statNewestDate"></div>
  </div>
</div>

<div class="charts-grid">
  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-title">Vendors by category</span>
      <span class="chart-badge" style="background:#ff5c3520;color:#ff5c35">Bar</span>
    </div>
    <div class="chart-wrap">
      <canvas id="catChart" role="img" aria-label="Bar chart showing vendors per category"></canvas>
    </div>
    <div class="legend" id="catLegend"></div>
  </div>
  <div class="chart-card">
    <div class="chart-card-header">
      <span class="chart-title">Vendors by subcategory</span>
      <span class="chart-badge" style="background:#4d9fff20;color:#4d9fff">Horizontal</span>
    </div>
    <div class="chart-wrap">
      <canvas id="subChart" role="img" aria-label="Horizontal bar chart showing vendors per subcategory"></canvas>
    </div>
  </div>
</div>

<div class="table-card">
  <div class="table-header">
    <span class="table-title">All vendors</span>
    <span class="table-count" id="tableCount"></span>
  </div>
  <div id="tableBody">
    <div class="loading"><div class="spinner"></div> Loading vendor data...</div>
  </div>
  <div class="pagination" id="pagination" style="display:none;">
    <span id="pagInfo"></span>
    <div class="pag-btns" id="pagBtns"></div>
  </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnADaVR_BB2tQf4scT4B1RvlPFYY_tKhP5jhawTYtO4Io1-2s48WjT7KMfhQPf85O2bagocll9uT5B/pub?gid=0&single=true&output=csv';
const CSV_URL = 'https://corsproxy.io/?' + encodeURIComponent(SHEET_URL);

const PALETTE = ['#ff5c35','#ffd700','#00e5a0','#4d9fff','#ff4db8','#bf7fff','#ff914d','#00cfff','#a8ff3e'];
const PALETTE_BG = ['#ff5c3525','#ffd70025','#00e5a025','#4d9fff25','#ff4db825','#bf7fff25','#ff914d25','#00cfff25','#a8ff3e25'];
const PAGE_SIZE = 15;

let allData = [], filtered = [], catChart, subChart, currentPage = 1;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  }).filter(r => r[headers[0]]);
}

function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length === 3) {
    let [d, m, y] = parts;
    if (y.length === 2) y = '20' + y;
    return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
  }
  return new Date(str);
}

function formatDate(str) {
  const d = parseDate(str);
  if (!d || isNaN(d)) return str;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function countBy(arr, key) {
  const counts = {};
  arr.forEach(r => { const v = r[key] || 'Unknown'; counts[v] = (counts[v] || 0) + 1; });
  return counts;
}

function getCatKey(data) {
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes('category') && !k.toLowerCase().includes('sub')) || keys[1];
}
function getSubKey(data) {
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes('sub')) || keys[2];
}
function getNameKey(data) {
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes('company') || k.toLowerCase().includes('name')) || keys[0];
}
function getOwnerKey(data) {
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes('owner')) || keys[4];
}
function getDateKey(data) {
  const keys = Object.keys(data[0] || {});
  return keys.find(k => k.toLowerCase().includes('date') || k.toLowerCase().includes('start')) || keys[3];
}

function populateFilters() {
  const catKey = getCatKey(allData);
  const subKey = getSubKey(allData);
  const dateKey = getDateKey(allData);

  const cats = [...new Set(allData.map(r => r[catKey]).filter(Boolean))].sort();
  const subs = [...new Set(allData.map(r => r[subKey]).filter(Boolean))].sort();
  const years = [...new Set(allData.map(r => {
    const d = parseDate(r[dateKey]);
    return d && !isNaN(d) ? d.getFullYear() : null;
  }).filter(Boolean))].sort((a,b) => b - a);

  const catSel = document.getElementById('categoryFilter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });

  const subSel = document.getElementById('subcategoryFilter');
  subs.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; subSel.appendChild(o); });

  const yrSel = document.getElementById('yearFilter');
  years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; yrSel.appendChild(o); });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const sub = document.getElementById('subcategoryFilter').value;
  const yr = document.getElementById('yearFilter').value;

  const catKey = getCatKey(allData);
  const subKey = getSubKey(allData);
  const nameKey = getNameKey(allData);
  const ownerKey = getOwnerKey(allData);
  const dateKey = getDateKey(allData);

  filtered = allData.filter(r => {
    if (search && !((r[nameKey] || '').toLowerCase().includes(search) || (r[ownerKey] || '').toLowerCase().includes(search))) return false;
    if (cat && r[catKey] !== cat) return false;
    if (sub && r[subKey] !== sub) return false;
    if (yr) {
      const d = parseDate(r[dateKey]);
      if (!d || isNaN(d) || d.getFullYear() !== parseInt(yr)) return false;
    }
    return true;
  });

  currentPage = 1;
  renderStats();
  renderCharts();
  renderTable();
}

function renderStats() {
  const nameKey = getNameKey(allData);
  const catKey = getCatKey(allData);
  const subKey = getSubKey(allData);
  const dateKey = getDateKey(allData);

  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statCats').textContent = new Set(filtered.map(r => r[catKey]).filter(Boolean)).size;
  document.getElementById('statSubs').textContent = new Set(filtered.map(r => r[subKey]).filter(Boolean)).size;

  const sorted = [...filtered].filter(r => parseDate(r[dateKey]) && !isNaN(parseDate(r[dateKey]))).sort((a,b) => parseDate(b[dateKey]) - parseDate(a[dateKey]));
  if (sorted.length) {
    document.getElementById('statNewest').textContent = sorted[0][nameKey] || '—';
    document.getElementById('statNewestDate').textContent = formatDate(sorted[0][dateKey]);
  } else {
    document.getElementById('statNewest').textContent = '—';
  }
}

function renderCharts() {
  const catKey = getCatKey(allData);
  const subKey = getSubKey(allData);

  const catCounts = countBy(filtered, catKey);
  const catLabels = Object.keys(catCounts).sort((a,b) => catCounts[b] - catCounts[a]);
  const catVals = catLabels.map(l => catCounts[l]);
  const catColors = catLabels.map((_, i) => PALETTE[i % PALETTE.length]);

  if (catChart) catChart.destroy();
  catChart = new Chart(document.getElementById('catChart'), {
    type: 'bar',
    data: {
      labels: catLabels,
      datasets: [{ data: catVals, backgroundColor: catColors, borderRadius: 6, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} vendors` }, backgroundColor: '#1f1f1f', titleColor: '#fff', bodyColor: '#aaa', borderColor: '#2a2a2a', borderWidth: 1 } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: 'Syne', size: 11, weight: '600' }, color: '#666' } },
        y: { grid: { color: '#1e1e1e' }, ticks: { font: { family: 'DM Mono', size: 11 }, color: '#555', stepSize: 1 }, beginAtZero: true }
      }
    }
  });

  const legend = document.getElementById('catLegend');
  legend.innerHTML = catLabels.map((l, i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${catColors[i]}"></span>${l} (${catCounts[l]})</span>`
  ).join('');

  const subCounts = countBy(filtered, subKey);
  const subLabels = Object.keys(subCounts).sort((a,b) => subCounts[b] - subCounts[a]).slice(0, 12);
  const subVals = subLabels.map(l => subCounts[l]);
  const subColors = subLabels.map((_, i) => PALETTE[i % PALETTE.length]);

  if (subChart) subChart.destroy();
  subChart = new Chart(document.getElementById('subChart'), {
    type: 'bar',
    data: {
      labels: subLabels,
      datasets: [{ data: subVals, backgroundColor: subColors, borderRadius: 4, borderSkipped: false, barThickness: 14 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} vendors` }, backgroundColor: '#1f1f1f', titleColor: '#fff', bodyColor: '#aaa', borderColor: '#2a2a2a', borderWidth: 1 } },
      scales: {
        x: { grid: { color: '#1e1e1e' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#555', stepSize: 1 }, beginAtZero: true },
        y: { grid: { display: false }, ticks: { font: { family: 'Syne', size: 11, weight: '600' }, color: '#666' } }
      }
    }
  });
}

function renderTable() {
  const nameKey = getNameKey(allData);
  const ownerKey = getOwnerKey(allData);
  const catKey = getCatKey(allData);
  const subKey = getSubKey(allData);
  const dateKey = getDateKey(allData);

  const allKeys = Object.keys(allData[0] || {});
  const contactKey = allKeys.find(k => k.toLowerCase().includes('contact')) || '';

  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('tableCount').textContent = `${total} vendor${total !== 1 ? 's' : ''}`;

  if (!pageData.length) {
    document.getElementById('tableBody').innerHTML = '<div class="no-data">No vendors match your filters.</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const catColorMap = {};
  [...new Set(allData.map(r => r[catKey]))].forEach((c, i) => { catColorMap[c] = i % PALETTE.length; });

  const rows = pageData.map(r => {
    const ci = catColorMap[r[catKey]] ?? 0;
    const color = PALETTE[ci];
    const bgColor = PALETTE_BG[ci];
    return `<tr>
      <td class="company-name">${r[nameKey] || '—'}</td>
      <td>${r[ownerKey] || '—'}</td>
      <td><span class="badge" style="background:${bgColor};color:${color}">${r[catKey] || '—'}</span></td>
      <td style="color:#888;font-size:0.78rem">${r[subKey] || '—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.72rem;color:#666">${formatDate(r[dateKey]) || '—'}</td>
      ${contactKey ? `<td style="color:#666;font-size:0.75rem">${r[contactKey] || '—'}</td>` : ''}
    </tr>`;
  }).join('');

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead><tr>
        <th>Company</th><th>Owner</th><th>Category</th><th>Subcategory</th><th>Start date</th>
        ${contactKey ? '<th>Contact</th>' : ''}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  const pag = document.getElementById('pagination');
  const pagInfo = document.getElementById('pagInfo');
  const pagBtns = document.getElementById('pagBtns');

  if (totalPages <= 1) { pag.style.display = 'none'; return; }

  pag.style.display = 'flex';
  pagInfo.textContent = `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, total)} of ${total}`;

  let btns = `<button class="pag-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
      btns += `<button class="pag-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 2) {
      btns += `<span style="padding:4px 4px;color:#555">…</span>`;
    }
  }
  btns += `<button class="pag-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
  pagBtns.innerHTML = btns;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    allData = parseCSV(text);
    filtered = [...allData];
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    populateFilters();
    renderStats();
    renderCharts();
    renderTable();
  } catch (e) {
    document.getElementById('tableBody').innerHTML = '<div class="no-data">Could not load data. Make sure your Google Sheet is published.</div>';
  }
}

loadData();
</script>
</body>
</html>
